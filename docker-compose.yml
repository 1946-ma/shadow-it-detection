# Shadow IT Detection Framework
#
# DEFAULT (host-backend) mode — Live Scan + Network Discovery work:
#   docker compose up -d            # starts db + frontend ONLY
#   # then run the API natively, as Administrator (needs the host's NICs):
#   python backend/app.py
#   Dashboard: http://localhost:3005   API (host): http://localhost:5000
#
# FULL-CONTAINER mode — everything in Docker, but NO live capture
# (a container on Docker Desktop/Windows cannot see the host's network
# adapters, so Live Scan and Network Discovery are unavailable):
#   docker compose --profile with-backend up -d --build
#
# The `backend` service is behind the `with-backend` profile so a plain
# `up` never starts it and collides with the host Flask on port 5000.
#
# Prerequisites on the host (both are gitignored):
#   ml/artifacts/  — run `python ml/model.py` once to train
#   data/          — CICIDS2017 CSVs (only needed for Run Detection)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shadow_it_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_docker_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      # initdb runs these once, in order, on a fresh volume
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/immutability.sql:/docker-entrypoint-initdb.d/02-immutability.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shadow_it_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    # Excluded from a default `up` — the API runs natively on the host so
    # Live Scan / Network Discovery can see real adapters. Start it in a
    # container only for the no-live-capture full-Docker demo:
    #   docker compose --profile with-backend up -d
    profiles: ["with-backend"]
    # retry until db is ready — also covers out-of-order starts from the
    # Docker Desktop UI, which does not honor depends_on conditions
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shadow_it_db
      DB_USER: shadow_it_app          # restricted role created by immutability.sql
      DB_PASSWORD: sh4d0w_app_2026
      JWT_SECRET: change-this-to-a-long-random-secret-for-production
      JWT_EXPIRY_HOURS: "8"
      FLASK_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
      - ./ml/artifacts:/app/ml/artifacts:ro

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        # URL the BROWSER uses to reach the API (baked in at build time).
        # In host-backend mode this points at the native Flask on the host.
        NEXT_PUBLIC_API_URL: http://localhost:5000
    # No depends_on: the browser reaches the API on the host, not a
    # sibling container — so the frontend must not wait on a Docker backend.
    ports:
      # host 3000 is inside a Windows excluded port range on the dev
      # machine; 3005 is already in Flask's CORS whitelist
      - "3005:3000"

volumes:
  pgdata:
